<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四國五日遊行程</title>
    <meta property="og:title" content="四國五日遊行程計畫">
    <meta property="og:description" content="2026 日本四國高松5日遊完整行程 — 栗林公園、小豆島、金刀比羅宮、屋島">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#3498db">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/icon-512.png">
    <link rel="apple-touch-icon" href="images/icon-512.png">
    <style>
        :root {
            --bg: #fff;
            --text: #000;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --badge-day: #00bef0;
            --badge-bus: #e67e22;
            --badge-train: #27ae60;
            --badge-ferry: #2980b9;
            --danger: #e74c3c;
            --success: #27ae60;
            --table-header: #e6f4ca;
            --border: #000;
            --border-light: #ccc;
            --bg-muted: #fafafa;
            --bg-prep: #faf3e8;
            --tab-active-text: #000;
            --tab-inactive-text: #2c93d4;
            --text-inverse: #fff;
            --bg-hover: #f0f0f0;
            --bg-soft: #f9f9f9;
            --border-soft: #ddd;
            --border-medium: #888;
            --muted-text: #999;
            --muted-text-strong: #555;
            --weather-bg: #f0f8ff;
            --weather-border: #b0d4f1;
            --share-bg: #eaf4fd;
            --share-bg-hover: #d4eaf7;
            --share-bg-active: #b0d4f1;
            --toast-bg: rgba(0, 0, 0, 0.8);
            --cost-total-bg: #f0f7e6;
            --cost-total-border: #8bc34a;
            --note-blue-bg: #f0f7ff;
            --note-amber-bg: #fff8e1;
            --note-amber-border: #ffe082;
            --note-amber-text: #e65100;
            --note-muted: #666;
            --note-border: #eee;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, "微軟正黑體", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }

        body.dark-mode {
            --bg: #1a1a2e;
            --text: #e0e0e0;
            --border: #444;
            --border-light: #555;
            --bg-muted: #262640;
            --bg-prep: #2a2a3e;
            --table-header: #2d4a2d;
            --tab-active-text: #e0e0e0;
            --tab-inactive-text: #7bb6e0;
            --accent: #6fb7e9;
            --accent-hover: #9fd2f1;
            --badge-day: #2fc7f0;
            --badge-bus: #f0a057;
            --badge-train: #6ecf95;
            --badge-ferry: #66a8d9;
            --danger: #ff7b6f;
            --success: #6ecf95;
            --bg-hover: #2f2f4a;
            --bg-soft: #2b2b44;
            --border-soft: #3a3a52;
            --border-medium: #666;
            --muted-text: #b1b1c6;
            --muted-text-strong: #c8c8d8;
            --weather-bg: #283248;
            --weather-border: #3d4b66;
            --share-bg: #253248;
            --share-bg-hover: #2f3d58;
            --share-bg-active: #3d4b66;
            --toast-bg: rgba(0, 0, 0, 0.9);
            --cost-total-bg: #2a3b2a;
            --cost-total-border: #6aa05a;
            --note-blue-bg: #27334a;
            --note-amber-bg: #3a3124;
            --note-amber-border: #6b5c3d;
            --note-amber-text: #f0b46a;
            --note-muted: #b1b1c6;
            --note-border: #3a3a52;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .tabs-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tabs-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tabs-actions .share-btn {
            float: none;
            margin-top: 0;
        }

        .tabs {
            display: flex;
            margin-bottom: -1px;
            position: relative;
            z-index: 1;
            margin-left: 10px;
        }

        .tab {
            padding: 5px 15px;
            border: 1px solid var(--border-light);
            background: var(--bg);
            cursor: pointer;
            font-size: 14px;
            margin-right: 2px;
            border-bottom: 1px solid var(--border);
            color: var(--tab-inactive-text);
            font-weight: bold;
        }

        .tab.active {
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--bg);
            color: var(--tab-active-text);
        }

        .tab:hover:not(.active) {
            background-color: var(--bg-hover);
        }

        .tab:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .content-box {
            border: 1px solid var(--border);
            padding: 15px;
            background: var(--bg);
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(2px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .content-box.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .day-header {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .day-badge {
            background: var(--badge-day);
            color: var(--text-inverse);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 14px;
            font-weight: normal;
        }

        table.itinerary-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.itinerary-table th,
        table.itinerary-table td {
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        table.itinerary-table th {
            background-color: var(--table-header);
            text-align: center;
            font-weight: bold;
        }

        table.itinerary-table td {
            vertical-align: middle;
        }

        .center {
            text-align: center;
        }

        .red-text {
            color: var(--danger);
        }

        .green-text {
            color: var(--success);
        }

        /* Cost tab styles */
        .cost-table {
            margin-bottom: 10px;
        }

        .cost-divider-row td {
            border-left: none !important;
            border-right: none !important;
            padding: 2px !important;
            background: transparent !important;
        }

        .cost-total-row {
            background-color: var(--bg-soft);
        }

        .cost-total-row td {
            font-size: 15px;
        }

        .footer-summary {
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
        }

        .footer-stat {
            white-space: nowrap;
        }

        /* 景點小圖與標籤 */
        .spot-img {
            height: 70px;
            width: auto;
            border-radius: 4px;
            margin-right: 5px;
            margin-top: 5px;
            border: 1px solid var(--border-soft);
        }

        .img-row {
            margin-top: 5px;
            display: flex;
            flex-wrap: wrap;
        }

        .badge-bus {
            background: var(--badge-bus);
            color: var(--text-inverse);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-train {
            background: var(--badge-train);
            color: var(--text-inverse);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-ferry {
            background: var(--badge-ferry);
            color: var(--text-inverse);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .map-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-left: 5px;
        }

        .map-link:hover {
            text-decoration: underline;
            color: var(--danger);
        }

        .loc-pin {
            color: var(--danger);
            font-size: 14px;
        }

        /* 準備頁籤區域樣式 */
        .prep-container {
            display: flex;
            border: 1px solid var(--border);
            background: var(--bg);
            min-height: 400px;
        }

        .prep-menu {
            width: 150px;
            background: var(--bg-prep);
            /* 淡橘色背景對齊截圖 */
            border-right: 1px solid var(--border-light);
        }

        .prep-menu-item {
            padding: 15px 10px;
            border-bottom: 2px solid var(--bg);
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            background: transparent;
            border: none;
            color: var(--text);
        }

        .prep-menu-item.active {
            background: var(--bg);
            border-right: 2px solid var(--bg);
            /* 隱藏右側線條 */
            border-left: 4px solid var(--accent);
            color: var(--accent);
            margin-right: -1px;
            z-index: 2;
            position: relative;
        }

        .prep-menu-item:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .prep-content {
            flex: 1;
            padding: 20px;
        }

        .prep-title {
            background: var(--accent);
            color: var(--text-inverse);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            margin-top: 0;
            font-size: 15px;
        }

        .prep-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .prep-table th,
        .prep-table td {
            border: 1px solid var(--border-medium);
            padding: 8px;
            vertical-align: middle;
        }

        .prep-table th {
            background-color: var(--table-header);
            /* 淺草綠 */
            text-align: center;
            font-weight: bold;
        }

        /* Weather badge */
        .weather-badge {
            display: inline-block;
            background: var(--weather-bg);
            border: 1px solid var(--weather-border);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: normal;
            margin-left: 8px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .weather-badge .weather-temp {
            font-weight: bold;
        }

        .weather-badge .rain-low {
            color: var(--accent);
        }

        .weather-badge .rain-mid {
            color: var(--badge-bus);
        }

        .weather-badge .rain-high {
            color: var(--danger);
        }

        .weather-pending {
            color: var(--muted-text);
            font-size: 12px;
            font-style: italic;
        }

        /* Share button */
        .share-btn {
            background: var(--share-bg);
            border: 1px solid var(--weather-border);
            color: var(--accent-hover);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            float: right;
            margin-top: -2px;
        }

        .share-btn:hover {
            background: var(--share-bg-hover);
        }

        .share-btn:active {
            background: var(--share-bg-active);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--text-inverse);
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 10000;
            background: var(--bg-muted);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .countdown {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 8px 10px;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .countdown .progress {
            position: relative;
            width: 140px;
            height: 6px;
            background: var(--bg-muted);
            border: 1px solid var(--border-light);
            border-radius: 999px;
            overflow: hidden;
        }

        .countdown .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0;
            transition: width 0.3s ease;
        }

        .countdown .countdown-status {
            font-weight: bold;
        }

        .countdown .countdown-text {
            color: var(--muted-text-strong);
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== Mobile Responsive ===== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h2 {
                font-size: 18px;
            }

            /* Tab bar: horizontal scroll */
            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin-left: 0;
                scrollbar-width: none;
            }

            .tabs::-webkit-scrollbar {
                display: none;
            }

            .tab {
                white-space: nowrap;
                flex-shrink: 0;
                padding: 5px 12px;
                font-size: 13px;
            }

            /* Itinerary table → card layout */
            table.itinerary-table thead {
                display: none;
            }

            table.itinerary-table,
            table.itinerary-table tbody,
            table.itinerary-table tr,
            table.itinerary-table td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }

            table.itinerary-table tr {
                border: 1px solid var(--border-soft);
                margin-bottom: 10px;
                padding: 10px;
                background: var(--bg-muted);
                border-radius: 6px;
            }

            table.itinerary-table td {
                border: none;
                padding: 4px 8px 4px 90px;
                text-align: left !important;
                position: relative;
                font-size: 13px;
            }

            table.itinerary-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 8px;
                font-weight: bold;
                color: var(--muted-text-strong);
                width: 75px;
                font-size: 12px;
            }

            table.itinerary-table td:first-child {
                background: var(--table-header);
                font-weight: bold;
                font-size: 15px;
                border-radius: 4px 4px 0 0;
                padding-left: 90px;
            }

            /* Daily total row */
            table.itinerary-table tr.daily-total-row {
                background: transparent;
                border: none;
                padding: 8px 0;
                text-align: right;
            }

            table.itinerary-table tr.daily-total-row td {
                padding-left: 8px;
                text-align: right !important;
            }

            table.itinerary-table tr.daily-total-row td::before {
                display: none;
            }

            /* Prep section: sidebar → horizontal tabs */
            .prep-container {
                flex-direction: column;
                min-height: auto;
            }

            .prep-menu {
                width: 100%;
                display: flex;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                scrollbar-width: none;
            }

            .prep-menu::-webkit-scrollbar {
                display: none;
            }

            .prep-menu-item {
                white-space: nowrap;
                flex-shrink: 0;
                padding: 10px 12px;
                font-size: 13px;
                border-bottom: none;
            }

            .prep-menu-item.active {
                border-right: none;
                border-left: none;
                border-bottom: 3px solid var(--accent);
                margin-right: 0;
                background: var(--bg);
            }

            .prep-content {
                padding: 15px 10px;
            }

            /* Prep tables → card layout */
            .prep-table:not(:has(thead))>tbody>tr:first-child,
            .prep-table thead {
                display: none;
            }

            .prep-table,
            .prep-table tbody,
            .prep-table tr,
            .prep-table td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }

            .prep-table tr {
                border: 1px solid var(--border-soft);
                margin-bottom: 10px;
                padding: 10px;
                border-radius: 6px;
                background: var(--bg-muted);
            }

            .prep-table td {
                border: none;
                padding: 4px 8px 4px 80px;
                text-align: left !important;
                position: relative;
            }

            .prep-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 8px;
                font-weight: bold;
                color: var(--muted-text-strong);
                width: 68px;
                font-size: 12px;
            }

            /* Prep table total rows */
            .prep-table tr.daily-total-row {
                background: transparent;
                border: none;
                padding: 4px 0;
                text-align: right;
            }

            .prep-table tr.daily-total-row td {
                padding-left: 8px;
                text-align: right !important;
            }

            .prep-table tr.daily-total-row td::before {
                display: none;
            }

            /* Packing list: two columns → single column */
            .pack-columns {
                flex-direction: column !important;
            }

            .pack-columns>div {
                padding-right: 0 !important;
            }

            /* Footer summary: wrap stats */
            .footer-summary {
                flex-direction: column;
                gap: 4px;
                font-size: 14px;
            }

            /* Images */
            .spot-img {
                height: 55px;
            }

            .content-box {
                padding: 10px;
            }

            .day-header {
                font-size: 14px;
                line-height: 1.5;
            }

            /* Map links more tappable */
            .map-link {
                padding: 2px 0;
            }

            /* Weather badge: own line on mobile */
            .weather-badge {
                display: block;
                margin-left: 0;
                margin-top: 6px;
                width: fit-content;
            }

            /* Share button: full width at bottom */
            .share-btn {
                float: none;
                display: block;
                width: 100%;
                text-align: center;
                margin-top: 12px;
                padding: 10px;
                font-size: 14px;
                box-sizing: border-box;
            }

            /* Cost tab mobile overrides */
            .cost-table tr.cost-divider-row {
                display: none;
            }

            .cost-table tr.cost-total-row {
                background: var(--cost-total-bg);
                border: 2px solid var(--cost-total-border);
            }

            .cost-table tr.cost-total-row td {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 16px;
            }

            .countdown {
                margin-left: 0;
                font-size: 12px;
                gap: 8px;
            }

            .countdown .progress {
                width: 110px;
            }

            .tab {
                font-size: 12px;
                padding: 4px 10px;
            }

            .day-header {
                font-size: 13px;
            }

            .theme-toggle {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            body {
                padding: 16px;
            }

            .tab {
                padding: 6px 14px;
                font-size: 13px;
            }

            .content-box {
                padding: 14px;
            }

            .prep-menu {
                width: 160px;
            }
        }

        @media print {
            body {
                background: var(--bg);
                color: var(--text);
                padding: 0;
            }

            .tabs,
            .tabs-actions,
            .theme-toggle,
            .countdown,
            .share-btn,
            #footer {
                display: none !important;
            }

            .no-print {
                display: none !important;
            }

            .tabs-wrap {
                display: none !important;
            }

            .content-box {
                border: none;
                padding: 0;
                margin: 0 0 20px 0;
                opacity: 1 !important;
                transform: none !important;
            }

            .print-all {
                display: block !important;
            }

            .print-all .content-box {
                display: block;
            }

            #app>.content-box {
                display: none;
            }

            .content-box[data-day] {
                page-break-after: always;
            }

            .prep-container {
                border: none;
            }

            table.itinerary-table th,
            table.itinerary-table td,
            .prep-table th,
            .prep-table td {
                border: 1px solid var(--border);
            }

            .map-link {
                color: var(--text);
                text-decoration: none;
            }
        }

        .print-all {
            display: none;
        }

        .no-print {
            display: inline-block;
        }

        /* Daily tips */
        .day-tips {
            background: var(--note-amber-bg);
            border: 1px solid var(--note-amber-border);
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }

        .day-tips-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--note-amber-text);
        }

        .day-tips-list {
            margin: 0;
            padding-left: 20px;
            font-size: 14px;
            line-height: 1.8;
        }

        .day-tips-list li {
            margin-bottom: 4px;
        }

        /* Checklist */
        .checklist-progress {
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--muted-text-strong);
        }

        .checklist-progress .chk-done {
            color: var(--success);
            font-weight: bold;
        }

        .checklist-item {
            display: block;
            font-size: 15px;
            line-height: 2.2;
            cursor: pointer;
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            vertical-align: middle;
            cursor: pointer;
            accent-color: var(--success);
        }

        .checklist-item.checked .chk-label {
            text-decoration: line-through;
            color: var(--muted-text);
        }
    </style>
</head>

<body>

        // Day index → location mapping
        const dayLocationMap = {
            0: { lat: 34.3333, lon: 134.05, city: '高松' },
            1: { lat: 34.3333, lon: 134.05, city: '高松' },
            2: { lat: 34.1833, lon: 133.8167, city: '琴平' },

            4: { lat: 34.3333, lon: 134.05, city: '高松' }
        };

        // Trip dates for matching API response
        const tripDates = Array.from({ length: CONFIG.days }, (_, i) => {
            const d = new Date(CONFIG.tripStart);
            d.setDate(d.getDate() + i);
            return d.toISOString().slice(0, 10);
        });

        // Cached weather data
        let weatherData = null;
        let weatherError = false;

        async function fetchWeather() {
            const today = new Date();
            const tripStart = new Date(CONFIG.tripStart);
            const daysUntil = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

            if (daysUntil > 16) {
                weatherData = null;
                return;
            }

            try {
                const cached = localStorage.getItem('weatherCache');
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < 3600000) {
                        weatherData = data;
                        render();
                        return;
                    }
                }

                const startDate = CONFIG.tripStart;
                const endDate = CONFIG.tripEnd;
                const [takamatsu, kotohira] = await Promise.all([
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.3333&longitude=134.05&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tokyo&start_date=${startDate}&end_date=${endDate}`).then(r => r.json()),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=34.1833&longitude=133.8167&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tokyo&start_date=${startDate}&end_date=${endDate}`).then(r => r.json())
                ]);

                weatherData = {};
                tripDates.forEach((date, i) => {
                    const src = (i === 2) ? kotohira : takamatsu;
                    const idx = src.daily.time.indexOf(date);
                    if (idx !== -1) {
                        weatherData[date] = {
                            code: src.daily.weather_code[idx],
                            max: Math.round(src.daily.temperature_2m_max[idx]),
                            min: Math.round(src.daily.temperature_2m_min[idx]),
                            rain: src.daily.precipitation_probability_max[idx]
                        };
                    }
                });
                localStorage.setItem('weatherCache', JSON.stringify({ data: weatherData, timestamp: Date.now() }));
                render();
            } catch (e) {
                console.warn('Weather fetch failed:', e);
                weatherError = true;
            }
        }

        function getWeatherHtml(dayIndex) {
            const date = tripDates[dayIndex];
            const today = new Date();
            const tripStart = new Date(CONFIG.tripStart);
            const daysUntil = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

            if (daysUntil > 16) {
                const daysToForecast = daysUntil - 16;
                return `<span class="weather-pending">🌤️ 預報將於 ${daysToForecast} 天後顯示</span>`;
            }

            if (weatherError) {
                return '<span class="weather-pending">⚠️ 天氣載入失敗</span>';
            }

            if (!weatherData || !weatherData[date]) {
                return '<span class="weather-pending">⏳ 載入天氣中...</span>';
            }

            const w = weatherData[date];
            const weather = weatherCodeMap[w.code] || { desc: '未知', emoji: '❓' };
            let rainClass = 'rain-low';
            if (w.rain > 60) rainClass = 'rain-high';
            else if (w.rain > 30) rainClass = 'rain-mid';

            return `<span class="weather-badge">${weather.emoji} <span class="weather-temp">${w.max}°/${w.min}°</span> <span class="${rainClass}">🌧${w.rain}%</span></span>`;
        }

        // === Share / Copy Itinerary ===
        function shareDay(dayIndex) {
            const day = itineraryData[dayIndex];
            if (!day) return;

            let text = `🗾 四國五日遊 ${day.day} ${day.date}\n`;
            text += '━━━━━━━━━━━━━━━\n';

            let dailyTotal = 0;
            day.events.forEach(ev => {
                const loc = ev.location.replace(/<[^>]+>/g, '').replace('📍 ', '').trim();
                const content = ev.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
                text += `${ev.time} ${loc} — ${content}\n`;

                const totalNum = parseMoney(ev.total);
                if (ev.total && (ev.total.includes('¥') || ev.total.includes('$'))) dailyTotal += totalNum;
            });

            text += '━━━━━━━━━━━━━━━\n';
            text += `當日費用：$${dailyTotal.toLocaleString()}`;

            if (navigator.share) {
                navigator.share({ title: `四國五日遊 ${day.day}`, text: text }).catch(() => { });
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showToast('已複製到剪貼簿！');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已複製到剪貼簿！');
            });
        }

        function shareAllDays() {
            let text = '🗾 四國五日遊 全部行程\n';
            text += '━━━━━━━━━━━━━━━\n';
            itineraryData.forEach((day, idx) => {
                text += `\n${day.day} ${day.date}\n`;
                day.events.forEach(ev => {
                    const loc = ev.location.replace(/<[^>]+>/g, '').replace('📍 ', '').trim();
                    const content = ev.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();

                if (idx !== itineraryData.length - 1) text += '----------------\n';
            });

            if (navigator.share) {
                navigator.share({ title: '四國五日遊 全部行程', text: text }).catch(() => { });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function parseMoney(str) {
            if (!str) return 0;
            return parseInt(String(str).replace(/[^0-9]/g, ''), 10) || 0;
        }

        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            if (!countdownEl) return;

            const start = new Date(CONFIG.tripStart);
            const end = new Date(CONFIG.tripEnd);
            const today = new Date();
            const daysUntil = Math.ceil((start - today) / (1000 * 60 * 60 * 24));

            let statusText = '';
            let detailText = '';
            if (daysUntil > 0) {
                statusText = `距離出發還有 ${daysUntil} 天`;
                detailText = '準備中';
            } else if (today >= start && today <= end) {
                statusText = '旅途進行中！';
                detailText = '出發中';
            } else {
                statusText = '旅途已結束';
                detailText = '回憶整理';
            }

            const totalTripDays = Math.max(1, CONFIG.days);
            let progress = 0;
            if (daysUntil > 0) {
                progress = 0;
            } else if (today >= start && today <= end) {
                const elapsed = Math.min(totalTripDays, Math.max(1, Math.ceil((today - start) / (1000 * 60 * 60 * 24)) + 1));
                progress = Math.min(100, Math.max(0, Math.round((elapsed / totalTripDays) * 100)));
            } else {
                progress = 100;
            }

            const statusEl = countdownEl.querySelector('.countdown-status');
            const textEl = countdownEl.querySelector('.countdown-text');
            const barEl = countdownEl.querySelector('.progress-bar');
            if (statusEl) statusEl.textContent = statusText;
            if (textEl) textEl.textContent = detailText;
            if (barEl) barEl.style.width = `${progress}%`;
        }

                toggle.textContent = '☀️';

                toggle.textContent = isDark ? '☀️' : '🌙';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

        function calculateGlobalTotals() {
            let totalTWD = 0;
            itineraryData.forEach(day => {
                day.events.forEach(ev => {
                    if (ev.total && ev.total.includes('$')) {
                        totalTWD += parseMoney(ev.total);
                    }
                });
            });

            const flight = CONFIG.flight;
            const hotel = CONFIG.hotel;
            const insurance = CONFIG.insurance;
            const simCard = CONFIG.simCard;
            const grandTotal = flight + hotel + insurance + simCard + totalTWD;
            const perPerson = Math.round(grandTotal / CONFIG.people);
            const dailyPerPerson = Math.round(perPerson / CONFIG.days);

            return { grandTotal, perPerson, dailyPerPerson, totalTWD };
        }

        function updateFooter() {
            const totals = calculateGlobalTotals();
            const now = new Date();

            const footer = document.getElementById('footer');
            if (footer) {
                footer.innerHTML = `
                    <span class="footer-stat">全部費用：<span class="red-text">TWD ${totals.grandTotal.toLocaleString()}</span></span>
                    <span class="footer-stat">每人平均：<span class="red-text">TWD ${totals.perPerson.toLocaleString()}</span></span>
                    <span class="footer-stat">每人每日平均：<span class="red-text">TWD ${totals.dailyPerPerson.toLocaleString()}</span></span>
                    <span class="footer-stat">最後修改：<span class="red-text">${timeStr}</span></span>
                `;
            }
        }

            if (tips && tips.length) {
                html += `<div class="day-tips">
                    <div class="day-tips-title">⚠️ 當日注意事項</div>
                    <ul class="day-tips-list">`;
                tips.forEach(tip => {
                    html += `<li>${tip}</li>`;
                });
                html += `</ul></div>`;
            }

            html += '</div>';
            return html;
        }

        function switchTab(idx) {
            currentTab = idx;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchPrepTab(tabName) {
            currentPrepTab = tabName;
            render();
        }

        function setupTabControls() {
            const tabs = Array.from(document.querySelectorAll('.tabs .tab'));
            tabs.forEach((tab, index) => {
                tab.addEventListener('click', () => {
                    const next = parseInt(tab.getAttribute('data-tab'), 10);
                    if (!Number.isNaN(next)) switchTab(next);
                });
                tab.addEventListener('keydown', (e) => {
                    const key = e.key;
                    if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(key)) return;
                    e.preventDefault();
                    let targetIndex = index;
                    if (key === 'ArrowLeft') targetIndex = Math.max(0, index - 1);
                    if (key === 'ArrowRight') targetIndex = Math.min(tabs.length - 1, index + 1);
                    if (key === 'Home') targetIndex = 0;
                    if (key === 'End') targetIndex = tabs.length - 1;
                    tabs[targetIndex].focus();
                    const nextTab = parseInt(tabs[targetIndex].getAttribute('data-tab'), 10);
                    if (!Number.isNaN(nextTab)) switchTab(nextTab);
                });
            });
        }

        function setupPrepTabs() {
            const prepTabs = Array.from(document.querySelectorAll('.prep-menu .prep-menu-item'));
            prepTabs.forEach((tab, index) => {
                tab.addEventListener('click', () => {
                    const next = tab.getAttribute('data-prep');
                    if (next) switchPrepTab(next);
                });
                tab.addEventListener('keydown', (e) => {
                    const key = e.key;
                    if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(key)) return;
                    e.preventDefault();
                    let targetIndex = index;
                    if (key === 'ArrowLeft') targetIndex = Math.max(0, index - 1);
                    if (key === 'ArrowRight') targetIndex = Math.min(prepTabs.length - 1, index + 1);
                    if (key === 'Home') targetIndex = 0;
                    if (key === 'End') targetIndex = prepTabs.length - 1;
                    prepTabs[targetIndex].focus();
                    const nextTab = prepTabs[targetIndex].getAttribute('data-prep');
                    if (nextTab) switchPrepTab(nextTab);
                });
            });
        }

        function renderAllDaysForPrint() {
            return itineraryData.map((day, i) => {
                let html = renderDay(i);
                html = html.replace(/class="share-btn"/, 'class="share-btn no-print"');
                html = html.replace(/^<div class="content-box" data-day="[^"]+">/, '<div class="content-box" data-day="print">');
                return html;
            }).join('');
        }

        render();
        fetchWeather();
        setupThemeToggle();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => { });
        }
    </script>
</body>

</html>
