        }

        }

        .red-text {

        .footer-summary {

            font-weight: bold;

            margin-top: 5px;

        }

            color: white;
            padding: 2px 4px;

            font-size: 12px;
            font-weight: bold;

            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;

            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;

            font-weight: bold;

            margin-right: -1px;
            z-index: 2;
            position: relative;

        .prep-content {

            padding: 20px;

            background: #3498db;
            color: white;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            margin-top: 0;

            background-color: #e6f4ca;

            font-weight: bold;

                html += renderPrep();

                html += renderDay(currentTab - 1);

            } else if (currentPrepTab === 'prep') {
                contentHtml = `
                    <h3 class="prep-title">事前準備</h3>
                    <table class="prep-table">
                        <tr><th style="width:50px;">完成</th><th style="width:150px;">地點/事由</th><th>行程內容</th><th style="width:80px;">費用</th><th style="width:50px;">份數</th><th style="width:80px;">合計</th></tr>
                        <tr>
                            <td class="center">✅</td><td>訂購 JR PASS</td><td>🈹 <a href="#">JR PASS 香川迷你鐵路&渡輪兩日券 (電子票券)</a><br>易遊網訂單 ORD0029072422</td><td class="center red-text">1,161</td><td class="center">2</td><td class="center red-text">2,322</td>
                        </tr>
                        <tr>
                            <td class="center">✅</td><td>訂購 實體網卡</td><td>🈹 <a href="#">日本 5天飆網吃到飽卡 (Docomo)</a><br>易遊網訂單 ORD0029070700</td><td class="center red-text">255</td><td class="center">2</td><td class="center red-text">510</td>

                        </tr>
                        <tr>

            } else if (currentPrepTab === 'pack') {
                contentHtml = `

                        <div class="prep-menu-item ${currentPrepTab === 'info' ? 'active' : ''}" onclick="switchPrepTab('info')">備用資訊</div>

                        ${contentHtml}
                    </div>
                </div>

        }

        function renderDay(dayIndex) {
            const day = itineraryData[dayIndex];
            if (!day) return "";

            let rawLocations = day.events.map(e => e.location.replace(/<[^>]+>/g, '')).filter(l => l && !l.includes('移動') && !l.includes('早起') && !l.includes('空檔') && !l.includes('起飛') && l !== '參道周邊' && !l.includes('市區休息'));
            let locations = rawLocations.map(l => l.replace('📍 ', '').trim()).join(' ➔ ');

            let html = '<div class="content-box">';
            html += `<div class="day-header"><span class="day-badge">${day.day.replace(" ", "")}</span> ${day.date} 【行程概要】 ${locations}</div>`;

            html += `
            <table class="itinerary-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">時間</th>
                        <th style="width: 150px;">地點事由</th>
                        <th>行程內容</th>
                        <th style="width: 120px;">相關物品</th>
                        <th style="width: 60px;">費用</th>
                        <th style="width: 40px;">數量</th>
                        <th style="width: 60px;">合計</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let dailyTotal = 0;
            day.events.forEach(ev => {
                let costNum = parseInt(ev.cost.replace(/[^0-9]/g, '')) || 0;
                let totalNum = parseInt(ev.total.replace(/[^0-9]/g, '')) || 0;
                if (ev.total && (ev.total.includes('¥') || ev.total.includes('$'))) dailyTotal += totalNum;

                let costClass = (ev.cost.includes('¥') || ev.cost.includes('$')) ? 'red-text' : '';
                let totalClass = (ev.total.includes('¥') || ev.total.includes('$')) ? 'red-text' : '';

                html += `
                    <tr>
                        <td class="center">${ev.time}</td>
                        <td style="font-weight:bold;">${ev.location}</td>
                        <td>${ev.content}</td>
                        <td class="center"><span style="border: 1px solid #cca; background: #ffe; padding: 2px 4px; font-size:12px;">${ev.item}</span></td>
                        <td class="center ${costClass}">${ev.cost}</td>
                        <td class="center">${ev.qty}</td>
                        <td class="center ${totalClass}">${ev.total}</td>
                    </tr>
                `;
            });
            html += `
                    <tr><td colspan="4"></td><td colspan="3" style="text-align: right;">當日累計：<span class="red-text">¥${dailyTotal}</span></td></tr>
                </tbody>
            </table></div>`;
            return html;
        }

        function switchTab(idx) {
            currentTab = idx;
            render();
        }

        function switchPrepTab(tabName) {
            currentPrepTab = tabName;
            render();
        }

        render();
    </script>
</body>
