<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四國五日遊行程 (含準備區塊)</title>
    <style>
        body {
            font-family: Arial, "微軟正黑體", sans-serif;
            background-color: #fff;
            color: #000;
            padding: 20px;
            margin: 0;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: -1px;
            position: relative;
            z-index: 1;
            margin-left: 10px;
        }

        .tab {
            padding: 5px 15px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 14px;
            margin-right: 2px;
            border-bottom: 1px solid black;
            color: #2c93d4;
            font-weight: bold;
        }

        .tab.active {
            border: 1px solid black;
            border-bottom: 1px solid white;
            color: black;
        }

        .tab:hover:not(.active) {
            background-color: #f0f0f0;
        }

        .content-box {
            border: 1px solid black;
            padding: 15px;
            background: white;
            margin-bottom: 20px;
        }

        .day-header {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .day-badge {
            background: #00bef0;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 14px;
            font-weight: normal;
        }

        table.itinerary-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.itinerary-table th,
        table.itinerary-table td {
            border: 1px solid black;
            padding: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        table.itinerary-table th {
            background-color: #e6f4ca;
            text-align: center;
            font-weight: bold;
        }

        table.itinerary-table td {
            vertical-align: middle;
        }

        .center {
            text-align: center;
        }

        .red-text {
            color: red;
        }

        .green-text {
            color: #27ae60;
        }

        /* Cost tab styles */
        .cost-table {
            margin-bottom: 10px;
        }

        .cost-divider-row td {
            border-left: none !important;
            border-right: none !important;
            padding: 2px !important;
            background: transparent !important;
        }

        .cost-total-row {
            background-color: #f9f9f9;
        }

        .cost-total-row td {
            font-size: 15px;
        }

        .footer-summary {
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
        }

        .footer-stat {
            white-space: nowrap;
        }

        /* 景點小圖與標籤 */
        .spot-img {
            height: 70px;
            width: auto;
            border-radius: 4px;
            margin-right: 5px;
            margin-top: 5px;
            border: 1px solid #ddd;
        }

        .img-row {
            margin-top: 5px;
            display: flex;
            flex-wrap: wrap;
        }

        .badge-bus {
            background: #e67e22;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-train {
            background: #27ae60;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-ferry {
            background: #2980b9;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .map-link {
            font-size: 13px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-left: 5px;
        }

        .map-link:hover {
            text-decoration: underline;
            color: #e74c3c;
        }

        .loc-pin {
            color: #e74c3c;
            font-size: 14px;
        }

        /* 準備頁籤區域樣式 */
        .prep-container {
            display: flex;
            border: 1px solid black;
            background: white;
            min-height: 400px;
        }

        .prep-menu {
            width: 150px;
            background: #faf3e8;
            /* 淡橘色背景對齊截圖 */
            border-right: 1px solid #ccc;
        }

        .prep-menu-item {
            padding: 15px 10px;
            border-bottom: 2px solid white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .prep-menu-item.active {
            background: white;
            border-right: 2px solid white;
            /* 隱藏右側線條 */
            border-left: 4px solid #3498db;
            color: #3498db;
            margin-right: -1px;
            z-index: 2;
            position: relative;
        }

        .prep-content {
            flex: 1;
            padding: 20px;
        }

        .prep-title {
            background: #3498db;
            color: white;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            margin-top: 0;
            font-size: 15px;
        }

        .prep-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .prep-table th,
        .prep-table td {
            border: 1px solid #888;
            padding: 8px;
            vertical-align: middle;
        }

        .prep-table th {
            background-color: #e6f4ca;
            /* 淺草綠 */
            text-align: center;
            font-weight: bold;
        }

        /* Weather badge */
        .weather-badge {
            display: inline-block;
            background: #f0f8ff;
            border: 1px solid #b0d4f1;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: normal;
            margin-left: 8px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .weather-badge .weather-temp {
            font-weight: bold;
        }

        .weather-badge .rain-low {
            color: #3498db;
        }

        .weather-badge .rain-mid {
            color: #e67e22;
        }

        .weather-badge .rain-high {
            color: #e74c3c;
        }

        .weather-pending {
            color: #999;
            font-size: 12px;
            font-style: italic;
        }

        /* Share button */
        .share-btn {
            background: #eaf4fd;
            border: 1px solid #b0d4f1;
            color: #2980b9;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            float: right;
            margin-top: -2px;
        }

        .share-btn:hover {
            background: #d4eaf7;
        }

        .share-btn:active {
            background: #b0d4f1;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== Mobile Responsive ===== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h2 {
                font-size: 18px;
            }

            /* Tab bar: horizontal scroll */
            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin-left: 0;
                scrollbar-width: none;
            }

            .tabs::-webkit-scrollbar {
                display: none;
            }

            .tab {
                white-space: nowrap;
                flex-shrink: 0;
                padding: 5px 12px;
                font-size: 13px;
            }

            /* Itinerary table → card layout */
            table.itinerary-table thead {
                display: none;
            }

            table.itinerary-table,
            table.itinerary-table tbody,
            table.itinerary-table tr,
            table.itinerary-table td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }

            table.itinerary-table tr {
                border: 1px solid #ddd;
                margin-bottom: 10px;
                padding: 10px;
                background: #fafafa;
                border-radius: 6px;
            }

            table.itinerary-table td {
                border: none;
                padding: 4px 8px 4px 90px;
                text-align: left !important;
                position: relative;
                font-size: 13px;
            }

            table.itinerary-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 8px;
                font-weight: bold;
                color: #555;
                width: 75px;
                font-size: 12px;
            }

            table.itinerary-table td:first-child {
                background: #e6f4ca;
                font-weight: bold;
                font-size: 15px;
                border-radius: 4px 4px 0 0;
                padding-left: 90px;
            }

            /* Daily total row */
            table.itinerary-table tr.daily-total-row {
                background: transparent;
                border: none;
                padding: 8px 0;
                text-align: right;
            }

            table.itinerary-table tr.daily-total-row td {
                padding-left: 8px;
                text-align: right !important;
            }

            table.itinerary-table tr.daily-total-row td::before {
                display: none;
            }

            /* Prep section: sidebar → horizontal tabs */
            .prep-container {
                flex-direction: column;
                min-height: auto;
            }

            .prep-menu {
                width: 100%;
                display: flex;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border-right: none;
                border-bottom: 1px solid #ccc;
                scrollbar-width: none;
            }

            .prep-menu::-webkit-scrollbar {
                display: none;
            }

            .prep-menu-item {
                white-space: nowrap;
                flex-shrink: 0;
                padding: 10px 12px;
                font-size: 13px;
                border-bottom: none;
            }

            .prep-menu-item.active {
                border-right: none;
                border-left: none;
                border-bottom: 3px solid #3498db;
                margin-right: 0;
                background: white;
            }

            .prep-content {
                padding: 15px 10px;
            }

            /* Prep tables → card layout */
            .prep-table:not(:has(thead)) > tbody > tr:first-child,
            .prep-table thead {
                display: none;
            }

            .prep-table,
            .prep-table tbody,
            .prep-table tr,
            .prep-table td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }

            .prep-table tr {
                border: 1px solid #ddd;
                margin-bottom: 10px;
                padding: 10px;
                border-radius: 6px;
                background: #fafafa;
            }

            .prep-table td {
                border: none;
                padding: 4px 8px 4px 80px;
                text-align: left !important;
                position: relative;
            }

            .prep-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 8px;
                font-weight: bold;
                color: #555;
                width: 68px;
                font-size: 12px;
            }

            /* Prep table total rows */
            .prep-table tr.daily-total-row {
                background: transparent;
                border: none;
                padding: 4px 0;
                text-align: right;
            }

            .prep-table tr.daily-total-row td {
                padding-left: 8px;
                text-align: right !important;
            }

            .prep-table tr.daily-total-row td::before {
                display: none;
            }

            /* Packing list: two columns → single column */
            .pack-columns {
                flex-direction: column !important;
            }

            .pack-columns > div {
                padding-right: 0 !important;
            }

            /* Footer summary: wrap stats */
            .footer-summary {
                flex-direction: column;
                gap: 4px;
                font-size: 14px;
            }

            /* Images */
            .spot-img {
                height: 55px;
            }

            .content-box {
                padding: 10px;
            }

            .day-header {
                font-size: 14px;
                line-height: 1.5;
            }

            /* Map links more tappable */
            .map-link {
                padding: 2px 0;
            }

            /* Weather badge: own line on mobile */
            .weather-badge {
                display: block;
                margin-left: 0;
                margin-top: 6px;
                width: fit-content;
            }

            /* Share button: full width at bottom */
            .share-btn {
                float: none;
                display: block;
                width: 100%;
                text-align: center;
                margin-top: 12px;
                padding: 10px;
                font-size: 14px;
                box-sizing: border-box;
            }

            /* Cost tab mobile overrides */
            .cost-table tr.cost-divider-row {
                display: none;
            }

            .cost-table tr.cost-total-row {
                background: #f0f7e6;
                border: 2px solid #8bc34a;
            }

            .cost-table tr.cost-total-row td {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <h2>四國五日遊：05-18 (一) ~ 05-22 (五)</h2>

    <div id="app"></div>

    <div class="footer-summary">
        <span class="footer-stat">全部費用：<span class="red-text">TWD 47,702</span></span>
        <span class="footer-stat">每人平均：<span class="red-text">TWD 23,851</span></span>
        <span class="footer-stat">每人每日平均：<span class="red-text">TWD 4,770</span></span>
        <span class="footer-stat">平均匯率：<span class="red-text">0.22</span></span>
        <span class="footer-stat">最後修改：<span class="red-text">2026-03-06 10:00:00</span></span>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // === Weather Code Map (WMO) ===
        const weatherCodeMap = {
            0: { desc: '晴天', emoji: '☀️' },
            1: { desc: '大致晴朗', emoji: '🌤️' },
            2: { desc: '局部多雲', emoji: '⛅' },
            3: { desc: '陰天', emoji: '☁️' },
            45: { desc: '霧', emoji: '🌫️' },
            48: { desc: '霧凇', emoji: '🌫️' },
            51: { desc: '小毛雨', emoji: '🌦️' },
            53: { desc: '毛雨', emoji: '🌦️' },
            55: { desc: '大毛雨', emoji: '🌧️' },
            61: { desc: '小雨', emoji: '🌧️' },
            63: { desc: '中雨', emoji: '🌧️' },
            65: { desc: '大雨', emoji: '🌧️' },
            71: { desc: '小雪', emoji: '🌨️' },
            73: { desc: '中雪', emoji: '🌨️' },
            75: { desc: '大雪', emoji: '🌨️' },
            77: { desc: '雪粒', emoji: '🌨️' },
            80: { desc: '陣雨', emoji: '🌦️' },
            81: { desc: '中陣雨', emoji: '🌦️' },
            82: { desc: '大陣雨', emoji: '⛈️' },
            85: { desc: '小陣雪', emoji: '🌨️' },
            86: { desc: '大陣雪', emoji: '🌨️' },
            95: { desc: '雷雨', emoji: '⛈️' },
            96: { desc: '雷雨+冰雹', emoji: '⛈️' },
            99: { desc: '強雷雨+冰雹', emoji: '⛈️' }
        };

        // Day index → location mapping
        const dayLocationMap = {
            0: { lat: 34.3333, lon: 134.05, city: '高松' },
            1: { lat: 34.3333, lon: 134.05, city: '高松' },
            2: { lat: 34.1833, lon: 133.8167, city: '琴平' },
            3: { lat: 34.3333, lon: 134.05, city: '高松' },
            4: { lat: 34.3333, lon: 134.05, city: '高松' }
        };

        // Trip dates for matching API response
        const tripDates = ['2026-05-18', '2026-05-19', '2026-05-20', '2026-05-21', '2026-05-22'];

        // Cached weather data
        let weatherData = null;
        let weatherError = false;

        async function fetchWeather() {
            const today = new Date();
            const tripStart = new Date('2026-05-18');
            const daysUntil = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

            if (daysUntil > 16) {
                weatherData = null;
                return;
            }

            try {
                const [takamatsu, kotohira] = await Promise.all([
                    fetch('https://api.open-meteo.com/v1/forecast?latitude=34.3333&longitude=134.05&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tokyo&start_date=2026-05-18&end_date=2026-05-22').then(r => r.json()),
                    fetch('https://api.open-meteo.com/v1/forecast?latitude=34.1833&longitude=133.8167&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Tokyo&start_date=2026-05-18&end_date=2026-05-22').then(r => r.json())
                ]);

                weatherData = {};
                tripDates.forEach((date, i) => {
                    const src = (i === 2) ? kotohira : takamatsu;
                    const idx = src.daily.time.indexOf(date);
                    if (idx !== -1) {
                        weatherData[date] = {
                            code: src.daily.weather_code[idx],
                            max: Math.round(src.daily.temperature_2m_max[idx]),
                            min: Math.round(src.daily.temperature_2m_min[idx]),
                            rain: src.daily.precipitation_probability_max[idx]
                        };
                    }
                });
                render();
            } catch (e) {
                console.warn('Weather fetch failed:', e);
                weatherError = true;
            }
        }

        function getWeatherHtml(dayIndex) {
            const date = tripDates[dayIndex];
            const today = new Date();
            const tripStart = new Date('2026-05-18');
            const daysUntil = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

            if (daysUntil > 16) {
                const daysToForecast = daysUntil - 16;
                return `<span class="weather-pending">🌤️ 預報將於 ${daysToForecast} 天後顯示</span>`;
            }

            if (weatherError) {
                return '<span class="weather-pending">⚠️ 天氣載入失敗</span>';
            }

            if (!weatherData || !weatherData[date]) {
                return '<span class="weather-pending">⏳ 載入天氣中...</span>';
            }

            const w = weatherData[date];
            const weather = weatherCodeMap[w.code] || { desc: '未知', emoji: '❓' };
            let rainClass = 'rain-low';
            if (w.rain > 60) rainClass = 'rain-high';
            else if (w.rain > 30) rainClass = 'rain-mid';

            return `<span class="weather-badge">${weather.emoji} <span class="weather-temp">${w.max}°/${w.min}°</span> <span class="${rainClass}">🌧${w.rain}%</span></span>`;
        }

        // === Share / Copy Itinerary ===
        function shareDay(dayIndex) {
            const day = itineraryData[dayIndex];
            if (!day) return;

            let text = `🗾 四國五日遊 ${day.day} ${day.date}\n`;
            text += '━━━━━━━━━━━━━━━\n';

            let dailyTotal = 0;
            day.events.forEach(ev => {
                const loc = ev.location.replace(/<[^>]+>/g, '').replace('📍 ', '').trim();
                const content = ev.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
                text += `${ev.time} ${loc} — ${content}\n`;

                const totalNum = parseInt(ev.total.replace(/[^0-9]/g, '')) || 0;
                if (ev.total && (ev.total.includes('¥') || ev.total.includes('$'))) dailyTotal += totalNum;
            });

            text += '━━━━━━━━━━━━━━━\n';
            text += `當日費用：¥${dailyTotal.toLocaleString()}`;

            navigator.clipboard.writeText(text).then(() => {
                showToast('已複製到剪貼簿！');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已複製到剪貼簿！');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        const itineraryData = [
            {
                day: "Day 1", date: "05-18(一)", dateShort: "18(一)",
                events: [
                    { time: "04:30", location: "托運報到", content: "CI278 報到 (第2航廈)，06:55 起飛。預計 10:35 抵達高松機場", item: "護照、機票", cost: "——", qty: "2", total: "——" },
                    { time: "11:30", location: "<span class='loc-pin'>📍</span> 高松機場 ➔ 瓦町", content: "搭乘 <span class='badge-bus'>🚌 機場利木津巴士</span>。<br><b>班次：11:30 發車 ➔ 12:15 抵達瓦町站</b>。<a href='https://maps.google.com/?q=高松瓦町駅' target='_blank' class='map-link'>🗺️ Google Maps</a>", item: "IC卡/日幣", cost: "¥210", qty: "2", total: "¥420" },

                            6. ⬜ 行李秤<br>
                            <br>
                            <h3 class="prep-title">實用資源</h3>
                            - 手機可用：<b>Google Translate</b> 鏡頭掃描翻譯<br>
                            - 乘換案內：<b>Japan Transit Planner</b> (查詢火車時刻表)
                        </div>
                    </div>
                `;
            } else if (currentPrepTab === 'info') {
                contentHtml = `
                    <h3 class="prep-title">備用資訊</h3>
                    <ul style="font-size: 14px; line-height:2.0;">
                        <li>📍 <b>台北駐日經濟文化代表處 (急難救助)</b><br>在日期間急難救助電話：<span class="red-text">080-6552-4764</span></li>
                        <li>📍 <b>日本緊急報警通話</b><br>警察局：<span class="red-text">110</span> / 火災、救護車：<span class="red-text">119</span></li>
                        <li>📍 <b>信用卡掛失專線</b><br>Visa 國際免付費電話：00531-44-0022<br>MasterCard 國際免付費電話：00531-11-3886</li>
                        <li>📍 <b>護照遺失處理步驟</b><br>1. 先至最近警察局報案，取得「遺失申報證明書」<br>2. 攜帶照片2張及身分證件，至代表處申請入國證明書</li>
                    </ul>
                `;
            }

            return `
                <div class="prep-container">
                    <div class="prep-menu">
                        <div class="prep-menu-item ${currentPrepTab === 'flight' ? 'active' : ''}" onclick="switchPrepTab('flight')">機票</div>
                        <div class="prep-menu-item ${currentPrepTab === 'hotel' ? 'active' : ''}" onclick="switchPrepTab('hotel')">飯店</div>
                        <div class="prep-menu-item ${currentPrepTab === 'prep' ? 'active' : ''}" onclick="switchPrepTab('prep')">事前準備</div>
                        <div class="prep-menu-item ${currentPrepTab === 'pack' ? 'active' : ''}" onclick="switchPrepTab('pack')">攜帶物品</div>
                        <div class="prep-menu-item ${currentPrepTab === 'info' ? 'active' : ''}" onclick="switchPrepTab('info')">備用資訊</div>
                    </div>
                    <div class="prep-content">
                        ${contentHtml}
                    </div>
                </div>
            `;
        }

        function renderCost() {
            // Calculate daily JPY totals from itinerary data
            const exchangeRate = 0.22; // 1 JPY = 0.22 TWD
            let totalJPY = 0;
            const dailyJPY = [];
            itineraryData.forEach((day, i) => {
                let dayTotal = 0;
                day.events.forEach(ev => {
                    if (ev.total && ev.total.includes('¥')) {
                        dayTotal += parseInt(ev.total.replace(/[^0-9]/g, '')) || 0;
                    }
                });
                dailyJPY.push(dayTotal);
                totalJPY += dayTotal;
            });
            const jpyInTWD = Math.round(totalJPY * exchangeRate);

            // Fixed TWD costs (from prep data)
            const flight = 23345;
            const hotel = 18224;
            const insurance = 1000;
            const simCard = 510;
            const jrPass = 2322;
            const grandTotal = flight + hotel + insurance + simCard + jrPass + jpyInTWD;
            const perPerson = Math.round(grandTotal / 2);

            // JR PASS usage calculation
            // 香川迷你鐵路&渡輪兩日券: covers JR/Kotoden trains + Shikoku Ferry in Kagawa (2 days)
            // Actual individual fares if purchased separately:
            const jrPassUsage = [
                { route: '高松港↔土庄港 渡輪（來回）', fare: 1400 },  // ¥700 × 2
                { route: '高松↔琴平 琴電（來回）', fare: 1280 }       // ¥640 × 2
            ];
            const jrPassTotalUse = jrPassUsage.reduce((s, u) => s + u.fare, 0); // ¥2,680
            const jrPassPriceTWD = 1161; // per person TWD price from EzTravel

            let html = '<div class="content-box">';
            html += '<h3 class="prep-title" style="font-size:18px; margin-bottom: 15px;">2人5日所有費用（台幣）</h3>';

            // Table 1: Cost Summary
            html += `
            <table class="prep-table cost-table">
                <thead>
                    <tr><th style="width:150px;">項目</th><th style="width:120px;">金額</th><th>備註</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td data-label="項目">✈️ 機票</td>
                        <td class="center red-text" data-label="金額">${flight.toLocaleString()}</td>
                        <td data-label="備註">中華航空 CI278 / CI279（每人 ${Math.round(flight/2).toLocaleString()}）</td>
                    </tr>
                    <tr>
                        <td data-label="項目">🏨 飯店</td>
                        <td class="center red-text" data-label="金額">${hotel.toLocaleString()}</td>
                        <td data-label="備註">FAV 2晚 7,618 ＋ 敷島館 1晚 5,907 ＋ Dormy Inn 1晚 4,699</td>
                    </tr>
                    <tr>
                        <td data-label="項目">🛡️ 旅遊保險</td>
                        <td class="center red-text" data-label="金額">${insurance.toLocaleString()}</td>
                        <td data-label="備註">海外突發疾病與不便險（每人 ${Math.round(insurance/2).toLocaleString()}）</td>
                    </tr>
                    <tr>
                        <td data-label="項目">📶 網卡</td>
                        <td class="center red-text" data-label="金額">${simCard.toLocaleString()}</td>
                        <td data-label="備註">日本5天飆網吃到飽 Docomo（每人 ${Math.round(simCard/2).toLocaleString()}）</td>
                    </tr>
                    <tr>
                        <td data-label="項目">🎫 票券</td>
                        <td class="center red-text" data-label="金額">${jrPass.toLocaleString()}</td>
                        <td data-label="備註">JR PASS 香川迷你鐵路＆渡輪兩日券（每人 ${Math.round(jrPass/2).toLocaleString()}）</td>
                    </tr>
                    <tr>
                        <td data-label="項目">💴 日本境內花費</td>
                        <td class="center red-text" data-label="金額">${jpyInTWD.toLocaleString()}</td>
                        <td data-label="備註">餐費、門票、交通等（¥${totalJPY.toLocaleString()} × ${exchangeRate}）</td>
                    </tr>
                    <tr class="cost-divider-row">
                        <td colspan="3"></td>
                    </tr>
                    <tr class="cost-total-row">
                        <td data-label="項目"><b>💰 費用總計</b></td>
                        <td class="center red-text" data-label="金額" colspan="2"><b>${grandTotal.toLocaleString()}</b></td>
                    </tr>
                    <tr class="cost-total-row">
                        <td data-label="項目"><b>💵 尚未付款</b></td>
                        <td class="center red-text" data-label="金額"><b>¥${totalJPY.toLocaleString()}</b></td>
                        <td data-label="備註">日幣現金部分（≈ TWD ${jpyInTWD.toLocaleString()}）</td>
                    </tr>
                    <tr class="cost-total-row">
                        <td data-label="項目"><b>👤 每人5天總計</b></td>
                        <td class="center red-text" data-label="金額"><b>${perPerson.toLocaleString()}</b></td>
                        <td data-label="備註">每人每日平均 ${Math.round(perPerson/5).toLocaleString()}</td>
                    </tr>
                </tbody>
            </table>`;

            // Table 2: Ticket/Pass Usage
            html += '<h3 class="prep-title" style="font-size:18px; margin-top: 30px; margin-bottom: 15px;">各票券使用情況</h3>';
            html += `
            <table class="prep-table cost-table">
                <thead>
                    <tr>
                        <th>票券名稱</th>
                        <th style="width:100px;">購買金額</th>
                        <th style="width:100px;">實際使用金額</th>
                        <th>使用明細</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td data-label="票券名稱">🚃 JR PASS 香川迷你鐵路＆渡輪兩日券</td>
                        <td class="center red-text" data-label="購買金額">TWD ${jrPassPriceTWD.toLocaleString()}<br><span style="font-size:12px;color:#666;">（每人）</span></td>
                        <td class="center" data-label="實際使用金額">¥${jrPassTotalUse.toLocaleString()}<br><span style="font-size:12px;color:#666;">≈ TWD ${Math.round(jrPassTotalUse * exchangeRate).toLocaleString()}</span></td>
                        <td data-label="使用明細" style="font-size:13px;">${jrPassUsage.map(u => u.route + ' ¥' + u.fare.toLocaleString()).join('<br>')}</td>
                    </tr>
                </tbody>
            </table>`;

            // Daily JPY breakdown
            html += '<h3 class="prep-title" style="font-size:18px; margin-top: 30px; margin-bottom: 15px;">各日日幣花費明細</h3>';
            html += `
            <table class="prep-table cost-table">
                <thead>
                    <tr>
                        <th style="width:100px;">日期</th>
                        <th style="width:120px;">日幣花費</th>
                        <th style="width:120px;">折合台幣</th>
                        <th>花費項目</th>
                    </tr>
                </thead>
                <tbody>`;

            itineraryData.forEach((day, i) => {
                const items = [];
                day.events.forEach(ev => {
                    if (ev.total && ev.total.includes('¥')) {
                        const loc = ev.location.replace(/<[^>]+>/g, '').replace('📍 ', '').trim();
                        items.push(loc + ' ' + ev.total);
                    }
                });
                html += `
                    <tr>
                        <td class="center" data-label="日期">${day.day}<br>${day.date}</td>
                        <td class="center red-text" data-label="日幣花費">¥${dailyJPY[i].toLocaleString()}</td>
                        <td class="center" data-label="折合台幣">≈ ${Math.round(dailyJPY[i] * exchangeRate).toLocaleString()}</td>
                        <td data-label="花費項目" style="font-size:13px;">${items.join('、')}</td>
                    </tr>`;
            });

            html += `
                    <tr class="daily-total-row">
                        <td class="center"><b>合計</b></td>
                        <td class="center red-text"><b>¥${totalJPY.toLocaleString()}</b></td>
                        <td class="center red-text"><b>≈ TWD ${jpyInTWD.toLocaleString()}</b></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>`;

            html += '</div>';
            return html;
        }

        function renderDay(dayIndex) {
            const day = itineraryData[dayIndex];
            if (!day) return "";

            let rawLocations = day.events.map(e => e.location.replace(/<[^>]+>/g, '')).filter(l => l && !l.includes('移動') && !l.includes('早起') && !l.includes('空檔') && !l.includes('起飛') && l !== '參道周邊' && !l.includes('市區休息'));
            let locations = rawLocations.map(l => l.replace('📍 ', '').trim()).join(' ➔ ');

            let html = '<div class="content-box">';
            html += `<div class="day-header"><button class="share-btn" onclick="shareDay(${dayIndex})">📋 分享行程</button><span class="day-badge">${day.day.replace(" ", "")}</span> ${day.date} 【行程概要】 ${locations} ${getWeatherHtml(dayIndex)}</div>`;

            html += `
            <table class="itinerary-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">時間</th>
                        <th style="width: 150px;">地點事由</th>
                        <th>行程內容</th>
                        <th style="width: 120px;">相關物品</th>
                        <th style="width: 60px;">費用</th>
                        <th style="width: 40px;">數量</th>
                        <th style="width: 60px;">合計</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let dailyTotal = 0;
            day.events.forEach(ev => {
                let costNum = parseInt(ev.cost.replace(/[^0-9]/g, '')) || 0;
                let totalNum = parseInt(ev.total.replace(/[^0-9]/g, '')) || 0;
                if (ev.total && (ev.total.includes('¥') || ev.total.includes('$'))) dailyTotal += totalNum;

                let costClass = (ev.cost.includes('¥') || ev.cost.includes('$')) ? 'red-text' : '';
                let totalClass = (ev.total.includes('¥') || ev.total.includes('$')) ? 'red-text' : '';

                html += `
                    <tr>
                        <td class="center" data-label="時間">${ev.time}</td>
                        <td style="font-weight:bold;" data-label="地點事由">${ev.location}</td>
                        <td data-label="行程內容">${ev.content}</td>
                        <td class="center" data-label="相關物品"><span style="border: 1px solid #cca; background: #ffe; padding: 2px 4px; font-size:12px;">${ev.item}</span></td>
                        <td class="center ${costClass}" data-label="費用">${ev.cost}</td>
                        <td class="center" data-label="數量">${ev.qty}</td>
                        <td class="center ${totalClass}" data-label="合計">${ev.total}</td>
                    </tr>
                `;
            });
            html += `
                    <tr class="daily-total-row"><td colspan="4"></td><td colspan="3" style="text-align: right;">當日累計：<span class="red-text">¥${dailyTotal}</span></td></tr>
                </tbody>
            </table></div>`;
            return html;
        }

        function switchTab(idx) {
            currentTab = idx;
            render();
        }

        function switchPrepTab(tabName) {
            currentPrepTab = tabName;
            render();
        }

        render();
        fetchWeather();
    </script>
</body>

</html>
